<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persistent To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="app-shell">
        <section class="app-header">
            <div>
                <h1>Persistent To-Do List</h1>
                <p>Save tasks, complete items, and keep filters between refreshes.</p>
            </div>
            <button id="theme-toggle" type="button" aria-label="Toggle theme">Dark mode</button>
        </section>

        <section class="todo-form-section">
            <form id="todo-form" class="todo-form">
                <label for="todo-input">Add a new task</label>
                <div class="form-row">
                    <input id="todo-input" name="todo" type="text" placeholder="What needs to be done?" autocomplete="off" />
                    <button type="submit">Add</button>
                </div>
            </form>
        </section>

        <section class="todo-controls">
            <div class="filter-group" role="group" aria-label="Filter tasks">
                <button data-filter="all" type="button" class="filter-button active">All</button>
                <button data-filter="active" type="button" class="filter-button">Active</button>
                <button data-filter="completed" type="button" class="filter-button">Completed</button>
            </div>
            <button id="clear-completed" type="button" class="secondary">Clear completed</button>
        </section>

        <section class="todo-list-section">
            <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
            <p id="empty-state" class="empty-state">No tasks yet. Add one above.</p>
        </section>

        <section class="summary-panel">
            <p><strong id="remaining-count">0</strong> task(s) remaining</p>
            <p>Filter preference persists across refreshes.</p>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
